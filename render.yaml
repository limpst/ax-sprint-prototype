# ──────────────────────────────────────────────────────────
#  에이톰-AX — Render 배포 Blueprint
#  GitHub 연동 후 render.com 에서 "New > Blueprint" 로 가져오기
# ──────────────────────────────────────────────────────────

services:
  - type: web                          # 웹 서비스 (HTTP)
    name: atomax-platform              # Render 대시보드에 표시되는 이름
    runtime: python                    # Python 런타임 사용
    region: singapore                  # 한국에서 가장 가까운 리전
    plan: free                         # 무료 플랜 (월 750시간 무료)

    buildCommand: pip install -r requirements.txt

    # $PORT 는 Render가 자동으로 주입하는 환경변수 (보통 10000)
    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.headless true
      --server.address 0.0.0.0
      --server.enableCORS false
      --browser.gatherUsageStats false

    healthCheckPath: /_stcore/health   # Render 헬스체크 엔드포인트

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"

    autoDeploy: true                   # GitHub push 시 자동 재배포
